<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />

    <title>Document</title>
  </head>
  <body>
    <div id="bg-wrapper">
      <div id="bg-a" class="bg-layer active"></div>
      <div id="bg-b" class="bg-layer"></div>
    </div>
    <div class="container">
      <h1 id="text1">Прогноз погоди</h1>

      <div id="auth-area">
        <!-- Реєстрація користувача -->
        <div class="auth-form" id="auth-form" aria-labelledby="auth-heading">
          <h2 id="auth-heading">Реєстрація</h2>
          <input type="text" id="reg-name" placeholder="Ім'я (необов'язково)" />
          <input type="email" id="reg-email" placeholder="Email" />
          <div class="password-wrap">
            <input type="password" id="reg-password" placeholder="Пароль" />
            <button type="button" class="eye-btn" onclick="togglePassword('reg-password', this)" aria-label="Показати пароль">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="password-wrap">
            <input type="password" id="reg-password2" placeholder="Повторіть пароль" />
            <button type="button" class="eye-btn" onclick="togglePassword('reg-password2', this)" aria-label="Показати пароль">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <button id="reg-btn">Зареєструватися</button>
          <div id="reg-msg" role="status" aria-live="polite"></div>
          <div class="auth-nav">
            Вже маєш акаунт? <a href="login.html">Увійти</a>
          </div>
        </div>
      </div>

      <div id="app-area" hidden>
        <div class="controls">
          <input
            type="text"
            id="city-input"
            placeholder="Введіть назву міста"
          />
          <button id="search-btn">Пошук</button>
          <button id="theme-toggle" aria-label="Переключити тему">Темна</button>
          <button id="logout-btn" title="Вийти">Вийти</button>
        </div>
        <div id="weather-result"></div>
      </div>
    </div>

    <script
      src="https://use.fontawesome.com/releases/v5.15.4/js/all.js"
      integrity="sha384-rOA1PnstxnOBLzCLMcre8ybwbTmemjzdNlILg8O7z1lUkLXozs4DHonlDtnE7fpc"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
    <script>
      function togglePassword(inputId, btn) {
        var input = document.getElementById(inputId);
        var isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.setAttribute('aria-label', isHidden ? 'Приховати пароль' : 'Показати пароль');
        btn.querySelector('.eye-icon').style.opacity = isHidden ? '0.45' : '1';
      }
    </script>
  </body>
</html>
